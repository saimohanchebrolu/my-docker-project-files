version: "3.9"

services:

  amazon-app:
    image: amazon
    networks:
      - amazon-net
    deploy:
      replicas: 5
      restart_policy:
        condition: on-failure

  nginx-lb:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - amazon-net
    deploy:
      replicas: 1

networks:
  amazon-net:
    driver: overlay
